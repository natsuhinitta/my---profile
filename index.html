<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>自己紹介</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-screen">
    <header class="profile-header" id="top">
      <p class="profile-label">--- STATUS ---</p>
      <h1 class="player-name">山田太郎</h1>
      <p class="player-title">Lv.1 研修冒険者</p>
    </header>

    <section class="rpg-window">
      <h2>■ PLAYER PROFILE</h2>
        <p>Name: 山田太郎</p>
        <p>Age: 17</p>
        <p>Occupation: 学生</p>
        <p>Location: 広島県</p>
    </section>

    <section class="rpg-window">
      <h2>■ CHARACTER</h2>
      <p>休日は家から出ない</p>
      <p>めんどくさがり</p>
      <p>1人の時間が大切</p>
    </section>

    <section class="rpg-window">
      <h2>■ STATUS</h2>
      <div class="stat-list">
        <div class="stat-row">
          <span class="stat-name">Creativity</span>
          <div class="stat-bar-track" aria-hidden="true">
            <div class="stat-bar" style="width: 70%"></div>
          </div>
          <span class="stat-value">70</span>
        </div>
        <div class="stat-row">
          <span class="stat-name">Laziness</span>
          <div class="stat-bar-track" aria-hidden="true">
            <div class="stat-bar" style="width: 100%"></div>
          </div>
          <span class="stat-value">100</span>
        </div>
        <div class="stat-row">
          <span class="stat-name">Programming</span>
          <div class="stat-bar-track" aria-hidden="true">
            <div class="stat-bar" style="width: 20%"></div>
          </div>
          <span class="stat-value">20</span>
        </div>
      </div>
    </section>

    <section class="rpg-window">
      <h2>■ FAVORITE</h2>
      <p>ゲーム</p>
      <p>漫画</p>
      <p>映画</p>
    </section>

    <section class="rpg-window">
      <h2>■ MOVIE</h2>
      <div class="movie-row">
        <ul class="movie-list">
          <li>千と千尋の神隠し</li>
          <li>君の名は。</li>
        </ul>
        <img
          class="movie-poster"
          src="images/5a9419b88a877ea25c7d20361d080bdb.jpg"
          alt="千と千尋の神隠しのイメージ"
          width="160"
          height="220"
        >
      </div>
    </section>

    <footer class="game-footer">
      <p>© 山田太郎 · HTML/CSS 研修用</p>
    </footer>
  </div>

  <a href="#top" class="back-to-top" aria-label="ページトップへ戻る">▲ TOP</a>
</body>
</html>
